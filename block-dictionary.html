<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블록 기능 사전 - AI Reference</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e4e4e4;
        }

        /* 헤더 */
        .header {
            background: rgba(0, 0, 0, 0.4);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
        }

        .header h1 span {
            font-size: 12px;
            color: #4fc3f7;
            font-weight: normal;
            margin-left: 8px;
            padding: 2px 8px;
            background: rgba(79, 195, 247, 0.2);
            border-radius: 4px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            color: #000;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-success {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: #fff;
        }

        /* 메인 */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* 소개 섹션 */
        .intro-section {
            background: linear-gradient(135deg, rgba(79, 195, 247, 0.1), rgba(156, 39, 176, 0.1));
            border: 1px solid rgba(79, 195, 247, 0.3);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .intro-section h2 {
            color: #4fc3f7;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .intro-section p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            line-height: 1.7;
        }

        /* 검색/필터 */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #4fc3f7;
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
        }

        .category-filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .category-btn.active {
            background: rgba(79, 195, 247, 0.2);
            border-color: #4fc3f7;
            color: #4fc3f7;
        }

        /* 블록 카드 그리드 */
        .block-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .block-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .block-card:hover {
            border-color: rgba(79, 195, 247, 0.5);
            transform: translateY(-2px);
        }

        .block-card-header {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .block-name {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .block-category {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .cat-logic { background: #e91e63; color: #fff; }
        .cat-math { background: #2196f3; color: #fff; }
        .cat-control { background: #4caf50; color: #fff; }
        .cat-timer { background: #ff9800; color: #000; }
        .cat-compare { background: #9c27b0; color: #fff; }

        .block-card-body {
            padding: 20px;
        }

        .block-description {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .block-section {
            margin-bottom: 16px;
        }

        .block-section-title {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        /* 포트 구성 */
        .port-variants {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .port-variant {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 10px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .port-tag {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'Consolas', monospace;
        }

        .port-input { background: #e91e63; color: #fff; }
        .port-output { background: #4caf50; color: #fff; }
        .port-param { background: #ff9800; color: #000; }

        .variant-note {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            margin-left: auto;
        }

        /* 예제 이미지 */
        .example-images {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .example-img {
            width: 80px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .example-img:hover {
            border-color: #4fc3f7;
        }

        .example-img img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .example-img.add-new {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
        }

        .example-img.add-new:hover {
            border-color: #4fc3f7;
            color: #4fc3f7;
        }

        /* AI 설명 */
        .ai-description {
            background: linear-gradient(135deg, rgba(156, 39, 176, 0.1), rgba(103, 58, 183, 0.1));
            border: 1px solid rgba(156, 39, 176, 0.3);
            border-radius: 8px;
            padding: 12px;
        }

        .ai-description-label {
            font-size: 10px;
            color: #9c27b0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ai-description-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.5;
        }

        .ai-description-text.empty {
            color: rgba(255, 255, 255, 0.4);
            font-style: italic;
        }

        /* 편집 버튼 */
        .edit-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .edit-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* 추가 카드 */
        .add-block-card {
            background: transparent;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-block-card:hover {
            border-color: #4fc3f7;
            background: rgba(79, 195, 247, 0.05);
        }

        .add-block-card .icon {
            font-size: 48px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 12px;
        }

        .add-block-card .text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        /* 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #1a1a3e;
            border-radius: 16px;
            width: 600px;
            max-width: 90vw;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 18px;
            color: #fff;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;
            cursor: pointer;
            border-radius: 50%;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            border-color: #4fc3f7;
        }

        .form-textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        .form-hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
        }

        .modal-footer {
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* 이미지 미리보기 모달 */
        .image-preview-modal {
            background: rgba(0, 0, 0, 0.95);
        }

        .image-preview-modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }

        /* 토스트 */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            background: #333;
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .toast.success { background: #4caf50; }
        .toast.error { background: #f44336; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* 스크롤바 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="editor.html" class="back-btn">← 에디터</a>
            <h1>블록 기능 사전 <span>AI Reference</span></h1>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="exportDictionary()">📤 내보내기</button>
            <button class="btn btn-secondary" onclick="importDictionary()">📥 가져오기</button>
            <button class="btn btn-success" onclick="generateAIReference()">🤖 AI 참조 데이터 생성</button>
        </div>
    </header>

    <main class="main">
        <section class="intro-section">
            <h2>🤖 AI가 참조하는 블록 기능 사전</h2>
            <p>
                이 페이지는 AI가 제어 로직 도면을 분석할 때 참조하는 블록 기능 정의서입니다.<br>
                각 블록의 기능, 포트 구성, 동작 방식을 상세히 기록하면 AI가 도면의 의미를 정확하게 이해할 수 있습니다.<br>
                예제 이미지를 추가하면 AI의 시각적 인식 정확도가 높아집니다.
            </p>
        </section>

        <div class="filter-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="블록 이름 또는 기능 검색..." oninput="filterBlocks()">
            </div>
            <div class="category-filters">
                <button class="category-btn active" data-cat="all" onclick="setCategory('all')">전체</button>
                <button class="category-btn" data-cat="logic" onclick="setCategory('logic')">논리</button>
                <button class="category-btn" data-cat="math" onclick="setCategory('math')">수학</button>
                <button class="category-btn" data-cat="control" onclick="setCategory('control')">제어</button>
                <button class="category-btn" data-cat="compare" onclick="setCategory('compare')">비교</button>
                <button class="category-btn" data-cat="timer" onclick="setCategory('timer')">타이머</button>
            </div>
        </div>

        <div class="block-grid" id="blockGrid">
            <!-- 블록 카드들이 여기에 렌더링됨 -->
        </div>
    </main>

    <!-- 편집 모달 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">블록 편집</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editBlockId">

                <div class="form-group">
                    <label class="form-label">블록 이름</label>
                    <input type="text" class="form-input" id="editName" placeholder="예: T블록">
                </div>

                <div class="form-group">
                    <label class="form-label">카테고리</label>
                    <select class="form-select" id="editCategory">
                        <option value="logic">논리 (Logic)</option>
                        <option value="math">수학 (Math)</option>
                        <option value="control">제어 (Control)</option>
                        <option value="compare">비교 (Compare)</option>
                        <option value="timer">타이머 (Timer)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">기본 설명</label>
                    <textarea class="form-textarea" id="editDescription" placeholder="블록의 기본 기능을 설명하세요..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">포트 구성 (쉼표로 구분, 변형은 줄바꿈)</label>
                    <textarea class="form-textarea" id="editPorts" placeholder="FLAG, T, YES, NO, OUT&#10;IN1, IN2, OUT"></textarea>
                    <div class="form-hint">같은 블록의 다른 포트 구성은 줄을 바꿔서 입력하세요</div>
                </div>

                <div class="form-group">
                    <label class="form-label">AI용 상세 설명</label>
                    <textarea class="form-textarea" id="editAiDescription" style="min-height:150px;" placeholder="AI가 이 블록을 이해하기 위한 상세 설명...&#10;&#10;예: 이 블록은 FLAG 입력 신호가 참(1)이면 T 입력값을 YES 출력으로 전달하고, 거짓(0)이면 NO 출력으로 전달합니다. OUT은 현재 활성화된 출력을 나타냅니다."></textarea>
                    <div class="form-hint">AI가 도면 분석 시 참조합니다. 가능한 상세히 작성하세요.</div>
                </div>

                <div class="form-group">
                    <label class="form-label">예제 이미지</label>
                    <div class="example-images" id="editImages">
                        <div class="example-img add-new" onclick="addExampleImage()">+</div>
                    </div>
                    <div class="form-hint">실제 도면에서 캡처한 블록 이미지를 추가하세요</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">취소</button>
                <button class="btn btn-primary" onclick="saveBlock()">저장</button>
            </div>
        </div>
    </div>

    <!-- 이미지 업로드 input (hidden) -->
    <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="handleImageUpload(event)">

    <script>
        // 블록 사전 데이터
        let blockDictionary = {};
        let currentCategory = 'all';
        let editingImages = [];

        // 기본 블록 정의
        const defaultBlocks = {
            'T': {
                id: 'T',
                name: 'T블록 (조건분기)',
                category: 'logic',
                description: '조건에 따라 신호를 YES 또는 NO로 분기하는 블록',
                portVariants: [
                    ['FLAG', 'T', 'YES', 'NO', 'OUT']
                ],
                aiDescription: 'T블록은 조건 분기 블록입니다. FLAG 입력이 참(1, True)이면 T 입력값을 YES 출력으로 전달하고, FLAG가 거짓(0, False)이면 NO 출력으로 전달합니다. OUT은 현재 활성화된 분기의 출력값을 나타냅니다. 주로 조건부 로직 흐름 제어에 사용됩니다.',
                images: []
            },
            'PID': {
                id: 'PID',
                name: 'PID블록 (제어기)',
                category: 'control',
                description: 'PID 제어 알고리즘을 수행하는 제어 블록',
                portVariants: [
                    ['SP', 'PV', 'MV'],
                    ['STPT', 'MEAS', 'MV', 'AUTO', 'MAN']
                ],
                aiDescription: 'PID블록은 비례-적분-미분 제어를 수행합니다. SP(Set Point)는 목표값, PV(Process Variable)는 현재 측정값, MV(Manipulated Variable)는 제어 출력입니다. 오차(SP-PV)를 기반으로 P(비례), I(적분), D(미분) 연산을 수행하여 MV를 계산합니다.',
                images: []
            },
            'AND': {
                id: 'AND',
                name: 'AND블록 (논리곱)',
                category: 'logic',
                description: '모든 입력이 참일 때만 출력이 참이 되는 논리 게이트',
                portVariants: [
                    ['IN1', 'IN2', 'OUT'],
                    ['IN1', 'IN2', 'IN3', 'OUT']
                ],
                aiDescription: 'AND블록은 논리 AND 연산을 수행합니다. 모든 입력(IN1, IN2, ...)이 참(1)일 때만 OUT이 참(1)이 됩니다. 하나라도 거짓(0)이면 OUT은 거짓(0)입니다. 여러 조건이 모두 만족해야 하는 경우에 사용합니다.',
                images: []
            },
            'OR': {
                id: 'OR',
                name: 'OR블록 (논리합)',
                category: 'logic',
                description: '하나 이상의 입력이 참이면 출력이 참이 되는 논리 게이트',
                portVariants: [
                    ['IN1', 'IN2', 'OUT']
                ],
                aiDescription: 'OR블록은 논리 OR 연산을 수행합니다. 입력 중 하나라도 참(1)이면 OUT이 참(1)이 됩니다. 모든 입력이 거짓(0)일 때만 OUT이 거짓(0)입니다. 여러 조건 중 하나만 만족해도 되는 경우에 사용합니다.',
                images: []
            },
            'NOT': {
                id: 'NOT',
                name: 'NOT블록 (반전)',
                category: 'logic',
                description: '입력 신호를 반전시키는 논리 게이트',
                portVariants: [
                    ['IN', 'OUT'],
                    ['IN1', 'N', 'OUT']
                ],
                aiDescription: 'NOT블록은 입력 신호를 반전시킵니다. 입력이 참(1)이면 출력은 거짓(0), 입력이 거짓(0)이면 출력은 참(1)입니다. 조건의 부정이나 신호 반전에 사용됩니다.',
                images: []
            },
            'ADD': {
                id: 'ADD',
                name: 'ADD블록 (덧셈)',
                category: 'math',
                description: '두 입력값을 더하는 수학 블록',
                portVariants: [
                    ['IN1', 'IN2', 'OUT']
                ],
                aiDescription: 'ADD블록은 두 입력값의 합을 계산합니다. OUT = IN1 + IN2. 아날로그 신호의 합산이나 오프셋 추가에 사용됩니다.',
                images: []
            },
            'SUB': {
                id: 'SUB',
                name: 'SUB블록 (뺄셈)',
                category: 'math',
                description: '두 입력값의 차이를 계산하는 수학 블록',
                portVariants: [
                    ['IN1', 'IN2', 'OUT']
                ],
                aiDescription: 'SUB블록은 두 입력값의 차이를 계산합니다. OUT = IN1 - IN2. 오차 계산이나 차분 연산에 사용됩니다.',
                images: []
            },
            'MUL': {
                id: 'MUL',
                name: 'MUL블록 (곱셈)',
                category: 'math',
                description: '두 입력값을 곱하는 수학 블록',
                portVariants: [
                    ['IN1', 'IN2', 'OUT']
                ],
                aiDescription: 'MUL블록은 두 입력값의 곱을 계산합니다. OUT = IN1 × IN2. 스케일링이나 게인 적용에 사용됩니다.',
                images: []
            },
            'DIV': {
                id: 'DIV',
                name: 'DIV블록 (나눗셈)',
                category: 'math',
                description: '두 입력값의 나눗셈을 수행하는 수학 블록',
                portVariants: [
                    ['IN1', 'IN2', 'OUT'],
                    ['NUM', 'DEN', 'OUT']
                ],
                aiDescription: 'DIV블록은 나눗셈을 수행합니다. OUT = IN1 / IN2 또는 OUT = NUM / DEN. 비율 계산이나 정규화에 사용됩니다. 0으로 나누기에 주의해야 합니다.',
                images: []
            },
            'SEL': {
                id: 'SEL',
                name: 'SEL블록 (선택)',
                category: 'logic',
                description: '선택 신호에 따라 입력 중 하나를 출력으로 전달',
                portVariants: [
                    ['IN1', 'IN2', 'SEL', 'OUT'],
                    ['A', 'B', 'G', 'OUT']
                ],
                aiDescription: 'SEL블록은 선택 블록입니다. SEL(또는 G) 신호가 0이면 IN1(A)을, 1이면 IN2(B)를 OUT으로 전달합니다. 수동/자동 전환이나 조건부 값 선택에 사용됩니다.',
                images: []
            },
            'COMPARE': {
                id: 'COMPARE',
                name: '비교블록 (GT/LT/EQ)',
                category: 'compare',
                description: '두 값을 비교하여 결과를 출력하는 블록',
                portVariants: [
                    ['IN1', 'IN2', 'OUT']
                ],
                aiDescription: '비교블록은 두 입력값을 비교합니다. GT(>): IN1이 IN2보다 크면 참, LT(<): IN1이 IN2보다 작으면 참, GE(>=), LE(<=), EQ(==), NE(!=) 등의 변형이 있습니다.',
                images: []
            },
            'LIM': {
                id: 'LIM',
                name: 'LIM블록 (리미터)',
                category: 'math',
                description: '입력값을 상한/하한 범위로 제한하는 블록',
                portVariants: [
                    ['IN', 'HI', 'LO', 'OUT']
                ],
                aiDescription: 'LIM블록은 입력값을 지정된 범위로 제한합니다. IN이 HI보다 크면 OUT=HI, LO보다 작으면 OUT=LO, 그 외에는 OUT=IN입니다. 값의 안전 범위 제한에 사용됩니다.',
                images: []
            }
        };

        // 초기화
        function init() {
            loadDictionary();
            renderBlocks();
        }

        // 데이터 로드
        function loadDictionary() {
            try {
                const saved = localStorage.getItem('blockDictionary');
                if (saved) {
                    blockDictionary = JSON.parse(saved);
                } else {
                    blockDictionary = { ...defaultBlocks };
                    saveDictionary();
                }
            } catch (e) {
                blockDictionary = { ...defaultBlocks };
            }
        }

        // 데이터 저장
        function saveDictionary() {
            localStorage.setItem('blockDictionary', JSON.stringify(blockDictionary));
        }

        // 블록 렌더링
        function renderBlocks() {
            const grid = document.getElementById('blockGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();

            let html = '';

            const sortedBlocks = Object.values(blockDictionary)
                .filter(block => {
                    if (currentCategory !== 'all' && block.category !== currentCategory) return false;
                    if (search) {
                        return block.name.toLowerCase().includes(search) ||
                               block.description.toLowerCase().includes(search) ||
                               (block.aiDescription || '').toLowerCase().includes(search);
                    }
                    return true;
                })
                .sort((a, b) => a.name.localeCompare(b.name));

            for (const block of sortedBlocks) {
                const catClass = `cat-${block.category}`;
                const catName = {
                    logic: '논리',
                    math: '수학',
                    control: '제어',
                    compare: '비교',
                    timer: '타이머'
                }[block.category] || block.category;

                html += `
                    <div class="block-card">
                        <div class="block-card-header">
                            <span class="block-name">${block.name}</span>
                            <span class="block-category ${catClass}">${catName}</span>
                        </div>
                        <div class="block-card-body">
                            <p class="block-description">${block.description}</p>

                            <div class="block-section">
                                <div class="block-section-title">포트 구성</div>
                                <div class="port-variants">
                                    ${(block.portVariants || []).map((variant, i) => `
                                        <div class="port-variant">
                                            ${variant.map(port => {
                                                const cls = port.toUpperCase().includes('OUT') ? 'port-output' :
                                                           port.toUpperCase().includes('IN') || port === 'FLAG' || port === 'T' || port === 'N' ? 'port-input' : 'port-param';
                                                return `<span class="port-tag ${cls}">${port}</span>`;
                                            }).join('')}
                                            ${block.portVariants.length > 1 ? `<span class="variant-note">변형 ${i + 1}</span>` : ''}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            ${(block.images && block.images.length > 0) ? `
                                <div class="block-section">
                                    <div class="block-section-title">예제 이미지</div>
                                    <div class="example-images">
                                        ${block.images.map((img, i) => `
                                            <div class="example-img" onclick="previewImage('${img}')">
                                                <img src="${img}" alt="예제 ${i + 1}">
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}

                            <div class="block-section">
                                <div class="ai-description">
                                    <div class="ai-description-label">🤖 AI 참조 설명</div>
                                    <div class="ai-description-text ${block.aiDescription ? '' : 'empty'}">
                                        ${block.aiDescription || '아직 AI용 설명이 없습니다. 편집을 눌러 추가하세요.'}
                                    </div>
                                </div>
                            </div>

                            <div style="text-align:right; margin-top:12px;">
                                <button class="edit-btn" onclick="editBlock('${block.id}')">✏️ 편집</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            // 새 블록 추가 카드
            html += `
                <div class="add-block-card" onclick="addNewBlock()">
                    <div class="icon">+</div>
                    <div class="text">새 블록 타입 추가</div>
                </div>
            `;

            grid.innerHTML = html;
        }

        // 카테고리 필터
        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.cat === cat);
            });
            renderBlocks();
        }

        // 검색 필터
        function filterBlocks() {
            renderBlocks();
        }

        // 블록 편집
        function editBlock(blockId) {
            const block = blockDictionary[blockId];
            if (!block) return;

            document.getElementById('editBlockId').value = blockId;
            document.getElementById('editName').value = block.name || '';
            document.getElementById('editCategory').value = block.category || 'logic';
            document.getElementById('editDescription').value = block.description || '';
            document.getElementById('editPorts').value = (block.portVariants || []).map(v => v.join(', ')).join('\n');
            document.getElementById('editAiDescription').value = block.aiDescription || '';

            editingImages = [...(block.images || [])];
            renderEditImages();

            document.getElementById('modalTitle').textContent = '블록 편집';
            document.getElementById('editModal').classList.add('show');
        }

        // 새 블록 추가
        function addNewBlock() {
            const id = 'BLOCK_' + Date.now();

            document.getElementById('editBlockId').value = id;
            document.getElementById('editName').value = '';
            document.getElementById('editCategory').value = 'logic';
            document.getElementById('editDescription').value = '';
            document.getElementById('editPorts').value = '';
            document.getElementById('editAiDescription').value = '';

            editingImages = [];
            renderEditImages();

            document.getElementById('modalTitle').textContent = '새 블록 추가';
            document.getElementById('editModal').classList.add('show');
        }

        // 편집 이미지 렌더링
        function renderEditImages() {
            const container = document.getElementById('editImages');
            let html = editingImages.map((img, i) => `
                <div class="example-img" style="position:relative;">
                    <img src="${img}" alt="예제 ${i + 1}">
                    <button onclick="removeEditImage(${i})" style="position:absolute; top:-5px; right:-5px; width:18px; height:18px; border-radius:50%; background:#f44336; border:none; color:#fff; font-size:12px; cursor:pointer;">×</button>
                </div>
            `).join('');

            html += `<div class="example-img add-new" onclick="addExampleImage()">+</div>`;
            container.innerHTML = html;
        }

        // 이미지 추가
        function addExampleImage() {
            document.getElementById('imageUpload').click();
        }

        // 이미지 업로드 처리
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                editingImages.push(e.target.result);
                renderEditImages();
            };
            reader.readAsDataURL(file);

            event.target.value = '';
        }

        // 이미지 제거
        function removeEditImage(index) {
            editingImages.splice(index, 1);
            renderEditImages();
        }

        // 블록 저장
        function saveBlock() {
            const id = document.getElementById('editBlockId').value;
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCategory').value;
            const description = document.getElementById('editDescription').value.trim();
            const portsText = document.getElementById('editPorts').value.trim();
            const aiDescription = document.getElementById('editAiDescription').value.trim();

            if (!name) {
                alert('블록 이름을 입력하세요.');
                return;
            }

            const portVariants = portsText.split('\n')
                .map(line => line.split(',').map(p => p.trim()).filter(p => p))
                .filter(arr => arr.length > 0);

            blockDictionary[id] = {
                id,
                name,
                category,
                description,
                portVariants,
                aiDescription,
                images: editingImages,
                updatedAt: new Date().toISOString()
            };

            saveDictionary();
            closeModal();
            renderBlocks();
            showToast('저장되었습니다', 'success');
        }

        // 모달 닫기
        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        // 이미지 미리보기
        function previewImage(src) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay image-preview-modal show';
            modal.onclick = () => modal.remove();
            modal.innerHTML = `<img src="${src}" onclick="event.stopPropagation()">`;
            document.body.appendChild(modal);
        }

        // 내보내기
        function exportDictionary() {
            const data = {
                version: '1.0',
                exportedAt: new Date().toISOString(),
                blocks: blockDictionary
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `block_dictionary_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);

            showToast('내보내기 완료', 'success');
        }

        // 가져오기
        function importDictionary() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';

            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                try {
                    const text = await file.text();
                    const data = JSON.parse(text);

                    if (data.blocks) {
                        blockDictionary = { ...blockDictionary, ...data.blocks };
                        saveDictionary();
                        renderBlocks();
                        showToast('가져오기 완료', 'success');
                    } else {
                        throw new Error('Invalid format');
                    }
                } catch (err) {
                    showToast('가져오기 실패: ' + err.message, 'error');
                }
            };

            input.click();
        }

        // AI 참조 데이터 생성
        function generateAIReference() {
            const aiData = {
                title: '제어 로직 블록 기능 사전',
                description: 'AI가 제어 로직 도면을 분석할 때 참조하는 블록 기능 정의서',
                generatedAt: new Date().toISOString(),
                blocks: {}
            };

            for (const [id, block] of Object.entries(blockDictionary)) {
                aiData.blocks[id] = {
                    name: block.name,
                    category: block.category,
                    description: block.description,
                    ports: block.portVariants,
                    aiReference: block.aiDescription,
                    hasExamples: (block.images || []).length > 0
                };
            }

            // JSON 파일로 저장
            const blob = new Blob([JSON.stringify(aiData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ai_block_reference.json';
            a.click();
            URL.revokeObjectURL(url);

            // data 폴더에도 저장 시도
            showToast('AI 참조 데이터 생성 완료', 'success');

            // 콘솔에도 출력
            console.log('=== AI 참조 데이터 ===');
            console.log(JSON.stringify(aiData, null, 2));
        }

        // 토스트
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), 3000);
        }

        // 초기화
        init();
    </script>
</body>
</html>
